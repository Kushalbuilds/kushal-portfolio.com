<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space UI</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- 🌌 Space Background -->
  <div class="space-bg"></div>

  <!-- ✨ Sparkling Stars -->
  <div class="stars">
    <span class="star" style="top:10%; left:20%;"></span>
    <span class="star" style="top:30%; left:70%;"></span>
    <span class="star" style="top:60%; left:40%;"></span>
    <span class="star" style="top:80%; left:10%;"></span>
    <span class="star" style="top:50%; left:85%;"></span>
  </div>

  <!-- 🔵 Bouncing Balls -->
  <div class="balls">
    <div class="ball ball1"></div>
    <div class="ball ball2"></div>
    <div class="ball ball3"></div>
  </div>

  <!-- 💻 Content -->
  <div class="container">
    <h1 class="title">🚀 Space UI</h1>
    <p class="subtitle">Sparkling Stars + Bouncing Energy</p>
  </div>

</body>
</html>
